<!-- <head>,meta tags favicon entities and comments -->
<!doctype html>
<html lang="en">
  <head>
    <!-- this section contains information about your webpage most of it not directly visible on the webpage -->
    <!-- this tells browser how to display characters correctly
      it supports english 
      telgu
      hindi use this almost every html [page] -->
    <meta charset="UTF-8" />
    <!-- this very important for  mobile devices without it for mobiles your website may look too small or incorrectly on phones width=device-width makes the webpage width match the device screen width -->
    <!-- initial scale 1.0 start normal zoom -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- this appears on the browser tab -->
    <title>my website</title>
    <!-- favicon is the small icon show in the browser tab. -->
    <link rel="icon" href="/basicsss'/637276.png" type="image/png" />
    <link rel="stylesheet" href="attribute.css" />
  </head>
  <body>
    <h1>my website</h1>
    <!-- a common location is just before the closing </body> tag -->
    <script src="script.js"></script>
    <!-- basic project
 index.htm - structure
 style.css - design 
 script.js - functionality 
 -->
    <!-- html comments are used for organizing the code dont put sensitive information on the comment user can inspect and html;msource see the comments -->

    <!-- HTML Entities
 some characters have special meaning in html
 for example <and> are used to create html
    if you want to display them as normal text,use html entities -->
    <p>&COPY; 2026 movieflix</p>
    <p>&gt; hello</p>
    <p>&lt;hello</p>
    <p>&amp; hello</p>
    <!-- display html tags as text -->
    <p>h1</p>
    <!-- the browser tries to interpret h1 as an html tag -->
    <!-- instead write -->
    <p>&lt; h1 &gt;</p>
    <p>hello&nbsp;&nbsp;Adesh</p>
    <!-- &nbsp non break space it adds spaces between words -->
  </body>
</html>
